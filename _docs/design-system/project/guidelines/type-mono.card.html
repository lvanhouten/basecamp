<!-- @dsCard group="Type" viewport="700x180" name="Numerics — tabular figures" subtitle="Timers, durations & counts in Hanken Grotesk with tabular-nums (round zero, no slash)." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--surface-app); color:var(--text-primary); display:flex; align-items:center; gap:40px; font-family:var(--font-sans); flex-wrap:wrap; }
  .big { font-family:var(--font-numeric); font-weight:800; font-size:56px; letter-spacing:-0.03em; font-variant-numeric:tabular-nums lining-nums; line-height:1; }
  .big .ms { color:var(--text-tertiary); font-size:30px; font-weight:700; }
  .col { display:flex; flex-direction:column; gap:6px; }
  .stat { font-family:var(--font-numeric); font-size:26px; font-weight:700; font-variant-numeric:tabular-nums lining-nums; letter-spacing:-0.01em; }
  .cap { font:var(--type-caption); color:var(--text-tertiary); text-transform:uppercase; letter-spacing:var(--tracking-wide); }
</style></head>
<body>
  <div class="col">
    <div class="big">10:08<span class="ms">.90</span></div>
    <span class="cap">Stopwatch · Hanken Grotesk 800 · tabular</span>
  </div>
  <div class="col">
    <div class="stat">07:30</div>
    <span class="cap">Alarm</span>
  </div>
  <div class="col">
    <div class="stat">1,204</div>
    <span class="cap">Steps</span>
  </div>
  <div class="col">
    <div class="stat">3 / 8</div>
    <span class="cap">List progress</span>
  </div>
</body></html>
