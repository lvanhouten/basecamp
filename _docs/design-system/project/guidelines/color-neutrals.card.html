<!-- @dsCard group="Colors" viewport="700x140" name="Neutrals" subtitle="Cool-leaning grey ramp, 0→950. Surfaces, text, hairlines." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 22px; background:var(--surface-app); font-family:var(--font-sans); }
  .row { display:flex; gap:6px; }
  .sw { flex:1; display:flex; flex-direction:column; gap:6px; }
  .chip { height:64px; border-radius:var(--radius-sm); box-shadow:inset 0 0 0 1px rgba(27,31,38,.06); }
  .k { font-size:11px; font-weight:600; color:var(--text-secondary); }
  .v { font-size:9px; color:var(--text-tertiary); font-family:var(--font-mono); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--neutral-0)"></div><span class="k">0</span><span class="v">FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-50)"></div><span class="k">50</span><span class="v">F6F7F9</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-100)"></div><span class="k">100</span><span class="v">EDEEF2</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-200)"></div><span class="k">200</span><span class="v">E0E2E9</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-300)"></div><span class="k">300</span><span class="v">C9CCD6</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-400)"></div><span class="k">400</span><span class="v">A6AAB8</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-500)"></div><span class="k">500</span><span class="v">7E8394</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-600)"></div><span class="k">600</span><span class="v">5B6072</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-700)"></div><span class="k">700</span><span class="v">3F4356</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-800)"></div><span class="k">800</span><span class="v">282C3D</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-900)"></div><span class="k">900</span><span class="v">1A1A2E</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-950)"></div><span class="k">950</span><span class="v">111120</span></div>
  </div>
</body></html>
