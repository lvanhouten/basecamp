<!-- @dsCard group="Brand" viewport="700x150" name="Logo & wordmark" subtitle="Peak mark + Hanken Grotesk ExtraBold lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; display: flex; align-items: center; gap: 44px; padding: 26px 30px; background: var(--surface-app); flex-wrap: wrap; }
  .lockup { display: inline-flex; align-items: center; gap: 11px; }
  .mark { width: 34px; height: 34px; color: var(--brand); }
  .wordmark { font-family: var(--font-sans); font-weight: 800; font-size: 30px; letter-spacing: -0.02em; color: var(--text-primary); }
  .wordmark b { color: var(--brand); font-weight: 800; }
  .tile { width: 60px; height: 60px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .cap { font: var(--type-caption); color: var(--text-tertiary); letter-spacing: var(--tracking-wide); text-transform: uppercase; }
  .onbrand { background: var(--brand); padding: 14px 18px; border-radius: var(--radius-md); display: inline-flex; align-items: center; gap: 9px; }
  .onbrand .mark { color: #fff; width: 26px; height: 26px; }
  .onbrand .wordmark { color: #fff; font-size: 22px; }
  .onbrand .wordmark b { color: #fff; }
</style>
</head>
<body>
  <div class="lockup">
    <svg class="mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M16 7 L30 27 H2 L16 7 Z M16 15.5 L21 27 H11 L16 15.5 Z" fill="currentColor"/>
      <path d="M13.9 4 L16 7 L18.1 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="wordmark">base<b>camp</b></span>
  </div>
  <div class="onbrand">
    <svg class="mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M16 7 L30 27 H2 L16 7 Z M16 15.5 L21 27 H11 L16 15.5 Z" fill="currentColor"/>
      <path d="M13.9 4 L16 7 L18.1 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="wordmark">base<b>camp</b></span>
  </div>
  <div class="col">
    <img class="tile" src="../assets/app-icon.svg" alt="basecamp app icon">
    <span class="cap">App icon</span>
  </div>
</body>
</html>
