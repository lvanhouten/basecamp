<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid. --space-1 (2px) → --space-12 (80px)." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px 24px; background:var(--surface-app); font-family:var(--font-sans); display:flex; flex-direction:column; gap:7px; }
  .r { display:flex; align-items:center; gap:14px; }
  .tk { width:88px; flex:none; font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); }
  .bar { height:14px; background:var(--brand); border-radius:3px; }
  .px { font-size:11px; color:var(--text-secondary); }
</style></head>
<body>
  <div class="r"><span class="tk">--space-2</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="r"><span class="tk">--space-3</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="r"><span class="tk">--space-4</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="r"><span class="tk">--space-5</span><div class="bar" style="width:16px"></div><span class="px">16 · gutter</span></div>
  <div class="r"><span class="tk">--space-7</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="r"><span class="tk">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="r"><span class="tk">--space-9</span><div class="bar" style="width:40px"></div><span class="px">40</span></div>
  <div class="r"><span class="tk">--space-11</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
  <div class="r"><span class="tk">--space-12</span><div class="bar" style="width:80px"></div><span class="px">80</span></div>
</body></html>
