<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Hanken Grotesk — mobile-first ramp, 2xs → 5xl." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px 24px; background:var(--surface-app); font-family:var(--font-sans); color:var(--text-primary); }
  .r { display:flex; align-items:baseline; gap:16px; padding:3px 0; }
  .r .lbl { width:120px; flex:none; font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono); }
  .s { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style></head>
<body>
  <div class="r"><span class="lbl">5xl · 64 · 800</span><span class="s" style="font-size:var(--text-5xl);font-weight:800;letter-spacing:var(--tracking-tight);line-height:1">24:00</span></div>
  <div class="r"><span class="lbl">3xl · 38 · 800</span><span class="s" style="font-size:var(--text-3xl);font-weight:800;letter-spacing:var(--tracking-tight)">Base camp</span></div>
  <div class="r"><span class="lbl">2xl · 30 · 700</span><span class="s" style="font-size:var(--text-2xl);font-weight:700;letter-spacing:var(--tracking-snug)">Today's plan</span></div>
  <div class="r"><span class="lbl">xl · 24 · 700</span><span class="s" style="font-size:var(--text-xl);font-weight:700">Workouts</span></div>
  <div class="r"><span class="lbl">lg · 20 · 600</span><span class="s" style="font-size:var(--text-lg);font-weight:600">Groceries list</span></div>
  <div class="r"><span class="lbl">md · 17 · 500</span><span class="s" style="font-size:var(--text-md);font-weight:500">Pick up oat milk</span></div>
  <div class="r"><span class="lbl">base · 15 · 400</span><span class="s" style="font-size:var(--text-base)">The all-in-one home base for the things you track.</span></div>
  <div class="r"><span class="lbl">sm · 13 · 500</span><span class="s" style="font-size:var(--text-sm);font-weight:500">3 of 8 done</span></div>
  <div class="r"><span class="lbl">xs · 12 · 500</span><span class="s" style="font-size:var(--text-xs);font-weight:500;color:var(--text-secondary)">Updated 2m ago</span></div>
</body></html>
