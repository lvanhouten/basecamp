<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-app); font-family:var(--font-sans); }
  .grid { display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .lbl { width:88px; flex:none; font:var(--type-caption); text-transform:uppercase; letter-spacing:var(--tracking-wide); color:var(--text-tertiary); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton } = window.BasecampDesignSystem_e1341e;
  const Plus = <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;
  const Arrow = <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  const More = <svg viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/></svg>;
  function Demo() {
    return (
      <div className="grid">
        <div className="row">
          <span className="lbl">Variants</span>
          <Button variant="primary">Start day</Button>
          <Button variant="secondary" iconLeft={Plus}>Add list</Button>
          <Button variant="ghost">Skip</Button>
          <Button variant="danger">Delete</Button>
        </div>
        <div className="row">
          <span className="lbl">Sizes</span>
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg" iconRight={Arrow}>Large</Button>
        </div>
        <div className="row">
          <span className="lbl">States</span>
          <Button loading>Saving</Button>
          <Button disabled>Disabled</Button>
          <div data-module="workouts" style={{display:'contents'}}><Button>Module accent</Button></div>
        </div>
        <div className="row">
          <span className="lbl">Icon btn</span>
          <IconButton aria-label="Add" variant="solid">{Plus}</IconButton>
          <IconButton aria-label="More" variant="soft">{More}</IconButton>
          <IconButton aria-label="More" variant="ghost">{More}</IconButton>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
