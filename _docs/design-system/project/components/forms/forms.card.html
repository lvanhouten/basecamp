<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-app); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px 28px; align-items:start; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .inline { display:flex; align-items:center; gap:14px; }
  .cap { font:var(--type-caption); text-transform:uppercase; letter-spacing:var(--tracking-wide); color:var(--text-tertiary); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Switch, Checkbox, SegmentedControl } = window.BasecampDesignSystem_e1341e;
  function Demo() {
    const [mode, setMode] = React.useState('Timer');
    const [on, setOn] = React.useState(true);
    return (
      <div className="grid">
        <div className="stack">
          <Input label="List name" placeholder="e.g. Weekend trip" defaultValue="Groceries" />
          <Input label="Email" error="That doesn't look right" defaultValue="riley@" />
        </div>
        <div className="stack">
          <span className="cap">Segmented</span>
          <SegmentedControl options={['Timer','Stopwatch','Alarm']} value={mode} onChange={setMode} />
          <span className="cap" style={{marginTop:'4px'}}>Toggles</span>
          <div className="inline">
            <Switch checked={on} onChange={e=>setOn(e.target.checked)} />
            <Checkbox label="Repeat daily" defaultChecked />
          </div>
          <Checkbox label="Vibrate on alarm" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
