<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-app); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:1.2fr 1fr; gap:18px; align-items:start; }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:12px; }
  .cap { font:var(--type-caption); text-transform:uppercase; letter-spacing:var(--tracking-wide); color:var(--text-tertiary); }
  .stats { display:flex; gap:26px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, ListItem, Badge, Tag, Avatar, ProgressRing, Stat, Checkbox } = window.BasecampDesignSystem_e1341e;
  const ListIcon = <svg viewBox="0 0 24 24" fill="none"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;
  const Chev = <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  function Demo() {
    return (
      <div className="grid">
        <div className="col">
          <Card variant="outlined" style={{padding:'8px'}}>
            <ListItem lead={ListIcon} title="Groceries" subtitle="3 of 8 done" trailing={Chev} onClick={()=>{}} />
            <ListItem lead={<Checkbox defaultChecked readOnly/>} title="Oat milk" done />
            <ListItem lead={<Checkbox readOnly/>} title="Sourdough" />
          </Card>
          <div className="row">
            <Tag>Groceries</Tag>
            <Tag onRemove={()=>{}}>Upper body</Tag>
            <Avatar name="Riley Chen" size="md" />
            <Avatar name="Sam Okafor" size="sm" />
          </div>
        </div>
        <div className="col">
          <div className="row">
            <Badge tone="success" dot>On track</Badge>
            <Badge tone="module">3 active</Badge>
            <Badge tone="warning">Due today</Badge>
            <Badge tone="danger">Missed</Badge>
          </div>
          <div className="row" style={{gap:'20px',marginTop:'4px'}}>
            <ProgressRing value={62} size={72} />
            <ProgressRing value={40} size={64} label={<b>4/10</b>} />
          </div>
          <div className="stats">
            <Stat value="1,204" label="Steps" />
            <Stat value="7" unit="day" label="Streak" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
